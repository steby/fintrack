name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
      SEED_OWNER_EMAIL: ${{ secrets.SEED_OWNER_EMAIL }}
      SEED_OWNER_PASSWORD: ${{ secrets.SEED_OWNER_PASSWORD }}
      CI: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so gitleaks can scan past commits, not just HEAD

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run migrations
        # Provisions the `ci` Neon branch's schema — a distinct step, not bundled into
        # app boot or the build, per development-workflow.md's "run DB migrations as a
        # distinct pre-deploy step" pattern. Idempotent (drizzle-kit tracks what's
        # already applied), so safe to run on every CI invocation.
        run: npm run db:migrate

      - name: Clean stale test/legacy data
        # The `ci` branch is long-lived, not reset per run, and this workflow's
        # concurrency.cancel-in-progress kills in-flight E2E runs on every superseding
        # push — normal during active development — before their own afterAll cleanup
        # executes. Left unchecked, orphaned "E2E "-prefixed rows accumulate run over
        # run and eventually bloat pages enough to blow E2E test timeouts. See
        # lib/db/clean-legacy-data.ts for the full rationale (also handles one-time
        # legacy-named rows from before seed.ts was genericized).
        run: npm run db:clean-legacy

      - name: Seed database
        # Idempotent (checks for an existing owner by email before inserting) — gives
        # the E2E suite a real owner account to log in as, on the `ci` branch, using
        # dedicated CI-only test credentials (not real user credentials).
        run: npm run db:seed

      - name: Secret scan (gitleaks)
        # Git-aware mode (no --no-git): scans tracked git history/objects, not the raw
        # working tree — so it naturally excludes node_modules/.next/.env (never committed)
        # while still catching a secret even if it was later removed from a file.
        run: |
          docker run --rm -v "$GITHUB_WORKSPACE:/repo" zricethezav/gitleaks:latest \
            detect --source /repo -v --exit-code 1

      - name: Static analysis (Semgrep)
        # JS/TS-specific packs only (not p/security-audit, which pulls in Python/Go/Java/
        # Ruby/PHP rules irrelevant to this repo and is dramatically slower to no benefit).
        # Runs entirely in-container via CLI — no GitHub Code Scanning/Advanced Security
        # dependency, so it works the same on private repos with no billing implications.
        run: |
          docker run --rm -v "$GITHUB_WORKSPACE:/src" -w /src semgrep/semgrep \
            semgrep scan --config=p/javascript --config=p/typescript --error --metrics=off \
            lib app e2e drizzle.config.ts vitest.config.ts vitest.setup.integration.ts \
            playwright.config.ts next.config.ts eslint.config.mjs

      - name: Dependency audit (fails on high/critical)
        run: npm audit --audit-level=high

      - name: Format check
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests (with 80% coverage gate on lib/**)
        run: npm run test:coverage

      - name: Integration tests
        run: npm run test:integration

      - name: Build
        run: npm run build

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: E2E tests
        run: npm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
